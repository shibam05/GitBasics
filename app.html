<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h2>Github clone homepage</h2>
    <p>Welcome to the Github clone!</p>
    <p>This is a simple clone of the Github homepage.</p>
    <div>
        <p>Here are some features of the Github clone:</p>
        <ul>
            <li>Create and manage repositories</li>
            <li>Collaborate with other developers</li>
            <li>Track issues and bugs</li>
        </ul>
    </div>
    <!-- upload functionality -->
    <div>
        <h3>Upload a file</h3>
        <input type="file" id="fileInput">
        <button onclick="uploadFile()">Upload</button>
    </div>

    <!-- show file metadata -->
    <div>
        <h3>Uploaded Files</h3>
        <ul id="fileList">
        </ul>
    </div>
    <script>
        function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const fileList = document.getElementById('fileList');

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const listItem = document.createElement('li');
                
                // Get file metadata
                const lastModified = new Date(file.lastModified).toLocaleString();
                const sizeKB = (file.size / 1024).toFixed(2);
                
                listItem.innerHTML = `
                    <strong>File Name:</strong> ${file.name}<br>
                    <strong>Size:</strong> ${sizeKB} KB (${file.size} bytes)<br>
                    <strong>Type:</strong> ${file.type}<br>
                    <strong>Last Modified:</strong> ${lastModified}
                `;
                
                fileList.appendChild(listItem);
                fileInput.value = ''; // Clear the input after upload
            } else {
                alert('Please select a file to upload.');
            }
        }
    </script>
</body>

</html>
